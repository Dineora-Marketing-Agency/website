name: Publish Porte des Indes site

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/publish-porte-des-indes.yml'

permissions:
  contents: write

concurrency:
  group: publish-porte-des-indes
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Webflow export
        run: |
          curl -L --fail --retry 5 --retry-delay 5 -o /tmp/site.zip 'https://shot-newark-guided-salvador.trycloudflare.com/kamils-beautiful-sitedsgcsfvds-porte-des-indes-upload.zip'

      - name: Replace repository contents
        shell: bash
        run: |
          find . -mindepth 1 -maxdepth 1 ! -name '.git' ! -name '.github' -exec rm -rf {} +
          unzip -q /tmp/site.zip -d .
          find . -name 'Zone.Identifier' -delete

      - name: Commit site
        shell: bash
        run: |
          git config user.name 'n8n Cloudflare publisher'
          git config user.email 'actions@users.noreply.github.com'
          git add -A
          git commit -m 'Publish La Porte Des Indes Webflow export' || exit 0
          git push
